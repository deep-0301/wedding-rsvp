<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hinal & Deep — Ring Ceremony RSVP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon:  #6b1010;
      --maroon2: #8b1a1a;
      --gold:    #c9a227;
      --gold2:   #d4a843;
      --cream:   #fdf4e3;
      --cream2:  #fef9f0;
      --border:  #e2c97e;
      --text:    #3a1a0a;
      --muted:   #7a4f2e;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top ornamental band ── */
    .top-band {
      width: 100%;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--maroon) 0px, var(--maroon) 18px,
        var(--gold)   18px, var(--gold)   36px,
        #e07b20       36px, #e07b20       54px,
        var(--gold)   54px, var(--gold)   72px
      );
    }

    /* ── Invitation image hero ── */
    .invitation-hero {
      width: 100%;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 0;
    }

    .ganesh-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--maroon);
      margin-bottom: 20px;
    }

    .invitation-frame {
      position: relative;
      max-width: 480px;
      width: 100%;
    }
    .invitation-frame::before,
    .invitation-frame::after {
      content: '';
      position: absolute;
      inset: -6px;
      border: 2px solid var(--gold2);
      pointer-events: none;
      z-index: 1;
    }
    .invitation-frame::after {
      inset: -12px;
      border-color: var(--border);
      opacity: 0.5;
    }
    .invitation-frame img {
      width: 100%;
      display: block;
      box-shadow: 0 8px 40px rgba(100, 30, 10, 0.2);
    }

    /* ── Divider ── */
    .ornament-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 36px auto 0;
      max-width: 480px;
      width: calc(100% - 40px);
      color: var(--gold);
      font-size: 20px;
    }
    .ornament-divider::before,
    .ornament-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold2));
    }
    .ornament-divider::after {
      background: linear-gradient(to left, transparent, var(--gold2));
    }

    /* ── RSVP Card ── */
    .card {
      background: var(--cream2);
      border: 1px solid var(--border);
      border-top: 3px solid var(--maroon);
      max-width: 540px;
      width: calc(100% - 40px);
      margin: 24px auto 60px;
      padding: 44px 48px;
      position: relative;
      box-shadow: 0 4px 30px rgba(100,30,10,0.1);
    }

    /* Corner flourishes */
    .card::before, .card::after {
      content: '✦';
      position: absolute;
      color: var(--gold);
      font-size: 16px;
      opacity: 0.5;
    }
    .card::before { top: 12px; left: 14px; }
    .card::after  { top: 12px; right: 14px; }

    .card-title {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      text-align: center;
      color: var(--maroon);
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    /* ── Form elements ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    label span.req { color: var(--maroon); margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #dcc98a;
      border-radius: 2px;
      background: #fffdf5;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(107,16,16,0.08);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 86px; }

    /* Attendance pills */
    .attend-group { display: flex; gap: 12px; }
    .attend-group input[type="radio"] { display: none; }
    .attend-group label {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      border: 1px solid #dcc98a;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: #fffdf5;
      transition: all 0.2s;
      margin-bottom: 0;
    }
    .attend-group input[type="radio"]:checked + label {
      background: var(--maroon);
      border-color: var(--maroon);
      color: #fff;
    }
    .attend-group label:hover { border-color: var(--gold); background: #fef5dc; }

    /* Guest counter */
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .counter-btn {
      width: 34px; height: 34px;
      border: 1px solid #dcc98a;
      border-radius: 2px;
      background: #fffdf5;
      cursor: pointer;
      font-size: 18px;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .counter-btn:hover { border-color: var(--gold); background: #fef5dc; color: var(--maroon); }
    .counter-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .counter-display {
      font-family: 'Great Vibes', cursive;
      font-size: 32px;
      color: var(--maroon);
      min-width: 30px;
      text-align: center;
      line-height: 1;
    }

    #attending-section { display: none; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #5a0808, var(--maroon2));
      border: none;
      border-radius: 2px;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background: linear-gradient(135deg, #3d0404, #5a0808);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(107,16,16,0.35);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      display: none;
      background: #fff5f5;
      border: 1px solid #e9b8b8;
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--maroon2);
      margin-bottom: 18px;
    }

    /* Success */
    #success-msg {
      display: none;
      text-align: center;
      padding: 16px 0 8px;
    }
    .success-icon { font-size: 50px; margin-bottom: 6px; }
    #success-msg h3 {
      font-family: 'Great Vibes', cursive;
      font-size: 44px;
      color: var(--maroon);
      margin: 6px 0 10px;
    }
    #success-msg p { font-size: 14px; color: var(--muted); line-height: 1.8; }

    /* Map */
    .map-row {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e8d5a0;
    }
    .map-row p { font-size: 12px; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.3px; }
    .map-btn {
      display: inline-block;
      padding: 9px 26px;
      border: 1px solid var(--gold2);
      border-radius: 2px;
      color: var(--maroon);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
    }
    .map-btn:hover { background: var(--maroon); border-color: var(--maroon); color: #fff; }

    /* Bottom band */
    .bottom-band {
      width: 100%;
      background: var(--maroon);
      text-align: center;
      padding: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255,228,150,0.85);
    }

    @media (max-width: 520px) {
      .card { padding: 30px 20px; }
      .attend-group { flex-direction: column; }
      .invitation-frame { max-width: 340px; }
    }
  </style>
</head>
<body>

  <div class="top-band"></div>

  <!-- Invitation Image -->
  <section class="invitation-hero">
    <p class="ganesh-header">|| Shree Ganeshay Namah ||</p>
    <div class="invitation-frame">
      <img
        src="https://raw.githubusercontent.com/deep-0301/wedding-rsvp/master/invitation"
        alt="Hinal & Deep Ring Ceremony Invitation"
      />
    </div>
  </section>

  <div class="ornament-divider">🪷</div>

  <!-- RSVP Card -->
  <main class="card">
    <div id="form-wrapper">

      <h2 class="card-title">Kindly Reply</h2>
      <p class="card-subtitle">Please respond by April 25, 2026</p>

      <div id="error-banner"></div>

      <form id="rsvp-form" novalidate>

        <div class="form-group">
          <label for="full-name">Full Name <span class="req">*</span></label>
          <input type="text" id="full-name" name="full_name" placeholder="Your full name" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (613) 000-0000" />
        </div>

        <div class="form-group">
          <label>Will you attend? <span class="req">*</span></label>
          <div class="attend-group">
            <input type="radio" id="attend-yes" name="attendance" value="yes" required />
            <label for="attend-yes">🪷 Joyfully Accepts</label>
            <input type="radio" id="attend-no" name="attendance" value="no" />
            <label for="attend-no">🙏 Regretfully Declines</label>
          </div>
        </div>

        <div id="attending-section">
          <div class="form-group">
            <label>Number of Guests (including yourself)</label>
            <div class="counter-row">
              <button type="button" class="counter-btn" id="dec-btn">−</button>
              <span class="counter-display" id="guest-count">1</span>
              <button type="button" class="counter-btn" id="inc-btn">+</button>
            </div>
            <input type="hidden" id="guest-count-input" name="guest_count" value="1" />
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message to the Couple <span style="color:#b08060;font-size:9px;">(optional)</span></label>
          <textarea id="message" name="message" placeholder="Leave your warm blessings here…"></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          🙏 &nbsp; Send RSVP
        </button>
      </form>

      <div class="map-row">
        <p>View the venue on Google Maps</p>
        <a
          class="map-btn"
          href="https://www.google.com/maps/search/?api=1&query=118+Pictou+Cres+Stittsville+ON+K2V+0R2"
          target="_blank"
          rel="noopener noreferrer"
        >Get Directions</a>
      </div>
    </div>

    <!-- Success -->
    <div id="success-msg">
      <div class="success-icon">🪷</div>
      <h3>Jai Shri Krishna!</h3>
      <p id="success-text"></p>
    </div>
  </main>

  <div class="bottom-band">
    || Jai Shree Krishna || Shubh Mangal Savdhan ||
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYv0M7XAfnM7TQ2W75cEhhEseQZRUD7FZ_TJZcpFvAy1-2DDofTBkydp9eLTNF-dz0/exec';

    document.querySelectorAll('input[name="attendance"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.getElementById('attending-section').style.display =
          radio.value === 'yes' ? 'block' : 'none';
      });
    });

    let guestCount = 1;
    const display = document.getElementById('guest-count');
    const hidden  = document.getElementById('guest-count-input');
    const decBtn  = document.getElementById('dec-btn');
    decBtn.disabled = true;

    document.getElementById('inc-btn').addEventListener('click', () => {
      guestCount++;
      display.textContent = guestCount;
      hidden.value = guestCount;
      decBtn.disabled = false;
    });
    decBtn.addEventListener('click', () => {
      if (guestCount > 1) {
        guestCount--;
        display.textContent = guestCount;
        hidden.value = guestCount;
        if (guestCount === 1) decBtn.disabled = true;
      }
    });

    document.getElementById('rsvp-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name       = document.getElementById('full-name').value.trim();
      const email      = document.getElementById('email').value.trim();
      const attendance = document.querySelector('input[name="attendance"]:checked');

      document.getElementById('error-banner').style.display = 'none';

      if (!name)       { showError('Please enter your full name.'); return; }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please enter a valid email address.'); return;
      }
      if (!attendance) { showError('Please indicate whether you will attend.'); return; }

      const attending = attendance.value === 'yes';
      const count     = parseInt(hidden.value, 10);
      const message   = document.getElementById('message').value.trim();
      const phone     = document.getElementById('phone').value.trim();

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Sending…';

      const payload = {
        full_name:   name,
        email:       email || 'Not provided',
        phone:       phone || 'Not provided',
        attendance:  attending ? 'Attending' : 'Not Attending',
        guest_count: attending ? count : 'N/A',
        message:     message || 'No message',
        timestamp:   new Date().toLocaleString('en-CA', { timeZone: 'America/Toronto' })
      };

      try {
        await fetch(SCRIPT_URL, {
          method:  'POST',
          mode:    'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });
        showSuccess(name, attending, count);
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '🙏 &nbsp; Send RSVP';
        showError('Something went wrong. Please try again.');
      }
    });

    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.textContent = msg;
      b.style.display = 'block';
      b.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function showSuccess(name, attending, count) {
      const t = document.getElementById('success-text');
      if (attending) {
        t.innerHTML =
          `We are so blessed that <strong>${name}</strong> will join us on May 3rd!<br>
           We have noted <strong>${count} guest${count !== 1 ? 's' : ''}</strong>.<br><br>
           We can't wait to celebrate with you. 🙏`;
      } else {
        t.innerHTML =
          `We will miss you, <strong>${name}</strong>.<br>
           Thank you for letting us know. You will be in our prayers. 🙏`;
      }
      document.getElementById('form-wrapper').style.display = 'none';
      document.getElementById('success-msg').style.display  = 'block';
    }
  </script>
</body>
</html>
